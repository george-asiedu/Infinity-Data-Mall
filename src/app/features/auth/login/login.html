<div class="w-full min-h-screen flex items-center justify-center bg-background px-4 py-12">
  <div class="w-full max-w-md flex flex-col items-center">
    <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-6 shadow-sm">
      <img ngSrc="iData_logo.png" width="48" height="48" alt="iData Logo" class="object-contain" />
    </div>

    <h1 class="text-3xl font-bold mb-2 text-center text-heading tracking-tight">Welcome Back</h1>
    <p class="text-sm text-center mb-8 text-paragraph">Login to access your dashboard</p>

    <form
      [formGroup]="loginForm"
      class="w-full bg-surface border border-border rounded-card p-6 flex flex-col gap-5 shadow-xs"
    >
      <div>
        <app-input
          label="Email Address"
          type="text"
          formControlName="email"
          [required]="true"
          placeholder="name@company.com"
          [invalid]="
            !!getControl('email')?.invalid &&
            !!(getControl('email')?.touched || getControl('email')?.dirty)
          "
        ></app-input>
        @if (getErrorMessage('email'); as errorMsg) {
          <small class="error">{{ errorMsg }}</small>
        }
      </div>

      <div>
        <div class="relative">
          <app-input
            label="Password"
            type="password"
            formControlName="password"
            [required]="true"
            placeholder="••••••••"
            [feedback]="false"
            [invalid]="
              !!getControl('password')?.invalid &&
              !!(getControl('password')?.touched || getControl('password')?.dirty)
            "
          ></app-input>
        </div>
        @if (getErrorMessage('password'); as errorMsg) {
          <small class="error">{{ errorMsg }}</small>
        }
      </div>

      <a
        routerLink="/forgot-password"
        class="text-right -mt-3 text-xs font-semibold text-primary hover:text-primary-hover transition-colors"
      >
        Forgot Password?
      </a>

      <app-button
        label="Sign In"
        [rounded]="false"
        customClass="w-full mt-2 !bg-primary !border-primary text-white hover:!bg-primary-hover disabled:!bg-primary-hover disabled:!opacity-50 transition-colors"
        [disabled]="loginForm.invalid"
        (clicked)="onSubmit()"
      ></app-button>

      <div class="flex items-center my-1">
        <div class="grow border-t border-border"></div>
        <span class="px-3 text-xs text-muted font-medium uppercase tracking-wider">or</span>
        <div class="grow border-t border-border"></div>
      </div>

      <app-button
        label="Continue with Google"
        icon="pi pi-google"
        [outlined]="true"
        [rounded]="false"
        customClass="w-full bg-surface text-heading border-border hover:!bg-background transition-colors shadow-sm"
        (clicked)="initiateGoogleLogin()"
      ></app-button>
    </form>

    <div class="mt-8 text-sm text-paragraph text-center">
      Don't have an account yet?
      <a routerLink="" class="text-primary font-semibold hover:text-primary-hover transition-colors"
        >Create an account</a
      >
    </div>
  </div>
</div>
