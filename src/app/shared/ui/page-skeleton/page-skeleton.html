<div class="flex flex-col gap-5 w-full">
  @if (header()) {
    <div class="flex flex-col gap-2">
      <app-skeleton width="240px" height="1.75rem" borderRadius="6px"></app-skeleton>
      <app-skeleton width="60%" height="0.9rem" borderRadius="6px"></app-skeleton>
    </div>
  }

  @if (banner()) {
    <app-skeleton height="9rem" borderRadius="16px"></app-skeleton>
  }

  @if (statCards() > 0) {
    <div class="grid grid-cols-2 xl:grid-cols-4 gap-3">
      @for (i of range(statCards()); track i) {
        <app-skeleton height="5.5rem" borderRadius="8px"></app-skeleton>
      }
    </div>
  }

  @if (filterBar()) {
    <div class="flex flex-wrap items-center gap-2">
      @for (i of range(4); track i) {
        <app-skeleton width="92px" height="2.25rem" borderRadius="8px"></app-skeleton>
      }
      <div class="ml-auto">
        <app-skeleton width="220px" height="2.25rem" borderRadius="8px"></app-skeleton>
      </div>
    </div>
  }

  @if (tableRows() > 0) {
    <div class="rounded-card border border-border bg-surface overflow-hidden shadow-card">
      <app-skeleton height="2.75rem" borderRadius="0"></app-skeleton>
      @for (i of range(tableRows()); track i) {
        <div class="px-4 py-3.5 border-t border-border">
          <app-skeleton height="1.1rem" borderRadius="6px"></app-skeleton>
        </div>
      }
    </div>
  }

  @if (blocks() > 0) {
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      @for (i of range(blocks()); track i) {
        <app-skeleton height="12rem" borderRadius="12px"></app-skeleton>
      }
    </div>
  }
</div>
