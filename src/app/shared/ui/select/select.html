<p-floatLabel variant="on">
  <p-select
    [(ngModel)]="value"
    [options]="options()"
    [optionLabel]="optionLabel()"
    [optionValue]="optionValue()"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [class]="customClass()"
    [filter]="filter()"
    [filterBy]="filterBy()"
    (onChange)="selectionChanged.emit($event.value)"
  >
  </p-select>
  <label [attr.for]="label()">{{ label() }}</label>
</p-floatLabel>
